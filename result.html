<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Analysis - BALANCE+</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>YOUR RESULT</h1>
            <p>Complete analysis of your health status</p>
        </header>

        <!-- BMI Status -->
        <section class="result-card">
            <h2>🧠 BODY STATUS (BMI)</h2>
            <div class="bmi-badge" id="bmiBadge">Normal</div>
            <p id="bmiValue" class="bmi-value">BMI: 22.0</p>
        </section>

        <!-- Lifestyle Risk -->
        <section class="result-card">
            <h2>⚠️ LIFESTYLE STATUS</h2>
            <div class="risk-badge" id="riskBadge">HIGH RISK</div>
        </section>

        <!-- Insights -->
        <section class="insight-section">
            <h3>📉 INSIGHT</h3>
            <ul id="insightList">
                <li>Energy likely to drop in afternoon</li>
                <li>High sugar intake pattern detected</li>
                <li>Low movement behavior</li>
            </ul>
        </section>

        <!-- Scores -->
        <section class="scores-section">
            <h3>📊 SCORES</h3>
            
            <div class="score-item">
                <label>Energy: <span id="energyScore">60</span>%</label>
                <div class="progress-bar">
                    <div class="progress-fill" id="energyBar" style="width: 60%;"></div>
                </div>
            </div>

            <div class="score-item">
                <label>Activity: <span id="activityScore">30</span>%</label>
                <div class="progress-bar">
                    <div class="progress-fill" id="activityBar" style="width: 30%;"></div>
                </div>
            </div>

            <div class="score-item">
                <label>Nutrition: <span id="nutritionScore">40</span>%</label>
                <div class="progress-bar">
                    <div class="progress-fill" id="nutritionBar" style="width: 40%;"></div>
                </div>
            </div>
        </section>

        <!-- Action Buttons -->
        <div class="button-group">
            <button class="btn-primary" onclick="navigateTo('action-plan.html')">
                See My Action Plan
            </button>
            <button class="btn-secondary" onclick="navigateTo('index.html')">
                Back to Dashboard
            </button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/bmi.js"></script>
    <script src="js/app.js"></script>
    <script>
        function displayResults() {
            const userData = getUserData();
            
            if (!userData || !userData.lastAnalysis) {
                alert('No data found. Please complete daily check first.');
                window.location.href = 'daily-check.html';
                return;
            }

            const analysis = userData.lastAnalysis;

            // BMI Status
            document.getElementById('bmiBadge').textContent = analysis.bmiStatus;
            document.getElementById('bmiValue').textContent = `BMI: ${analysis.bmi.toFixed(1)}`;

            // Risk Status
            const riskBadge = document.getElementById('riskBadge');
            riskBadge.textContent = analysis.lifestyleRisk;
            riskBadge.style.backgroundColor = analysis.lifestyleRisk === 'HIGH' ? '#ff6b6b' : '#51cf66';

            // Insights
            const insightList = document.getElementById('insightList');
            insightList.innerHTML = analysis.insights.map(i => `<li>${i}</li>`).join('');

            // Scores
            document.getElementById('energyScore').textContent = analysis.energyScore;
            document.getElementById('activityScore').textContent = analysis.activityScore;
            document.getElementById('nutritionScore').textContent = analysis.nutritionScore;

            document.getElementById('energyBar').style.width = analysis.energyScore + '%';
            document.getElementById('activityBar').style.width = analysis.activityScore + '%';
            document.getElementById('nutritionBar').style.width = analysis.nutritionScore + '%';
        }

        function navigateTo(page) {
            window.location.href = page;
        }

        displayResults();
    </script>
</body>
</html>
