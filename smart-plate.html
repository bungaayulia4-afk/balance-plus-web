<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Plate Guide - BALANCE+</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>SMART PLATE GUIDE</h1>
            <p>Balanced nutrition at a glance</p>
        </header>

        <!-- Plate Visual -->
        <section class="plate-section">
            <svg class="plate" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <!-- Plate outline -->
                <circle cx="150" cy="150" r="140" fill="none" stroke="#999" stroke-width="2"/>
                
                <!-- Vegetables (50%) - Green -->
                <path d="M 150 10 A 140 140 0 0 1 249 249 L 150 150 Z" fill="#51cf66" opacity="0.8"/>
                
                <!-- Carbs (25%) - Yellow -->
                <path d="M 249 249 A 140 140 0 0 1 51 249 L 150 150 Z" fill="#ffd43b" opacity="0.8"/>
                
                <!-- Protein (25%) - Red -->
                <path d="M 51 249 A 140 140 0 0 1 150 10 L 150 150 Z" fill="#ff8787" opacity="0.8"/>
                
                <!-- Center circle -->
                <circle cx="150" cy="150" r="40" fill="white" stroke="#999" stroke-width="1"/>
                <text x="150" y="155" text-anchor="middle" font-size="14" font-weight="bold">PLATE</text>
            </svg>
        </section>

        <!-- Legend -->
        <section class="plate-legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #51cf66;"></div>
                <div>
                    <strong>🟢 50% Vegetables</strong>
                    <p>Leafy greens, broccoli, carrots</p>
                </div>
            </div>

            <div class="legend-item">
                <div class="legend-color" style="background-color: #ffd43b;"></div>
                <div>
                    <strong>🟡 25% Carbs</strong>
                    <p>Whole grains, rice, potatoes</p>
                </div>
            </div>

            <div class="legend-item">
                <div class="legend-color" style="background-color: #ff8787;"></div>
                <div>
                    <strong>🔴 25% Protein</strong>
                    <p>Chicken, fish, beans, eggs</p>
                </div>
            </div>
        </section>

        <!-- Recommendation -->
        <section class="recommendation-card">
            <h3>💡 Recommendation:</h3>
            <p id="plateRec">"Your plate today lacks fiber. Add greens."</p>
        </section>

        <!-- Action Button -->
        <button class="btn-primary" onclick="generateMealPlan()">
            Generate Meal Plan
        </button>

        <button class="btn-secondary" onclick="navigateTo('action-plan.html')">
            Back to Action Plan
        </button>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        function generateMealPlan() {
            const mealPlans = [
                "Breakfast: Oatmeal with berries and almond butter\nLunch: Grilled chicken with brown rice and steamed broccoli\nDinner: Salmon with sweet potato and mixed greens",
                "Breakfast: Egg white omelet with vegetables\nLunch: Turkey sandwich with whole wheat bread and salad\nDinner: Lean beef with quinoa and roasted vegetables",
                "Breakfast: Greek yogurt with granola and fruit\nLunch: Tuna salad with olive oil dressing\nDinner: Chicken stir-fry with brown rice"
            ];
            const plan = mealPlans[Math.floor(Math.random() * mealPlans.length)];
            alert('📋 YOUR MEAL PLAN:\n\n' + plan);
        }

        function navigateTo(page) {
            window.location.href = page;
        }
    </script>
</body>
</html>
