<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Progress - BALANCE+</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>MY PROGRESS</h1>
            <p>Track your weekly improvements</p>
        </header>

        <!-- Weekly Chart -->
        <section class="progress-card">
            <h2>📅 Weekly Balance Score</h2>
            <div class="chart-container">
                <div class="chart-bar">
                    <div class="bar" style="height: 60%;"></div>
                    <label>Mon</label>
                </div>
                <div class="chart-bar">
                    <div class="bar" style="height: 80%;"></div>
                    <label>Tue</label>
                </div>
                <div class="chart-bar">
                    <div class="bar" style="height: 40%;"></div>
                    <label>Wed</label>
                </div>
                <div class="chart-bar">
                    <div class="bar" style="height: 85%;"></div>
                    <label>Thu</label>
                </div>
                <div class="chart-bar">
                    <div class="bar" style="height: 65%;"></div>
                    <label>Fri</label>
                </div>
                <div class="chart-bar">
                    <div class="bar" style="height: 70%;"></div>
                    <label>Sat</label>
                </div>
                <div class="chart-bar">
                    <div class="bar" style="height: 75%;"></div>
                    <label>Sun</label>
                </div>
            </div>
        </section>

        <!-- Improvement Badge -->
        <section class="improvement-section">
            <h3>🏆 Improvement:</h3>
            <div class="improvement-badge">+15% better than last week</div>
        </section>

        <!-- Stats -->
        <section class="stats-section">
            <div class="stat-card">
                <h4>Total Check-ins</h4>
                <p class="stat-number" id="totalCheckins">12</p>
            </div>

            <div class="stat-card">
                <h4>Avg BMI</h4>
                <p class="stat-number" id="avgBmi">22.5</p>
            </div>

            <div class="stat-card">
                <h4>Best Day</h4>
                <p class="stat-number" id="bestDay">Thursday</p>
            </div>

            <div class="stat-card">
                <h4>Streak</h4>
                <p class="stat-number" id="streak">5 days</p>
            </div>
        </section>

        <!-- Action Buttons -->
        <button class="btn-primary" onclick="navigateTo('daily-check.html')">
            New Daily Check
        </button>

        <button class="btn-secondary" onclick="navigateTo('index.html')">
            Back to Dashboard
        </button>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        function loadProgress() {
            const userData = getUserData();
            if (userData && userData.checkIns && userData.checkIns.length > 0) {
                document.getElementById('totalCheckins').textContent = userData.checkIns.length;
                
                // Calculate average BMI
                const avgBmi = userData.checkIns.reduce((sum, check) => {
                    const bmi = calculateBMI(check.weight, check.height);
                    return sum + bmi;
                }, 0) / userData.checkIns.length;
                document.getElementById('avgBmi').textContent = avgBmi.toFixed(1);
            }
        }

        function navigateTo(page) {
            window.location.href = page;
        }

        loadProgress();
    </script>
</body>
</html>
